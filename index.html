<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidStream - Watch Anime Free</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <!-- Optimized CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER (kept inline for performance - only one header) -->
  <header class="header py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div onclick="goHome()" class="flex items-center gap-2 text-2xl sm:text-3xl font-black text-blue-500 cursor-pointer">
          <i class="fa-solid fa-bolt"></i>
          <span class="tracking-tighter hidden md:block">VidStream</span>
        </div>
      </div>

      <div class="flex-1 max-w-2xl mx-4 sm:mx-8">
        <div class="relative w-full">
          <input 
            type="text" 
            id="searchInput"
            placeholder="Search anime..." 
            class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-2.5 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm sm:text-base transition-all"
            onkeypress="if(event.key === 'Enter') searchAnime()"
          />
          <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4">
        <button onclick="installApp()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-5 py-2 rounded-full transition hidden lg:flex">
          <i class="fa-solid fa-download"></i> App
        </button>
        <div class="text-[10px] sm:text-xs font-bold bg-emerald-500/10 text-emerald-400 px-3 sm:px-4 py-2 rounded-full border border-emerald-500/30 whitespace-nowrap">
          AD-FREE
        </div>
      </div>
    </div>
  </header>

  <main class="pt-20" id="app"></main>

  <!-- FOOTER -->
  <footer class="bg-black py-12 text-center text-xs text-gray-500 border-t border-zinc-900 mt-12">
    VidStream • Free Anime Streaming • For demonstration purposes only
  </footer>

  <!-- Main entry point with ES Modules (modern & optimized) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
